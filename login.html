<script>

function entrar() {
    aguardar();

    var emailVar = email_input.value;
    var senhaVar = senha_input.value;

    if (emailVar == "" || senhaVar == "") {
        alert("Preencha todos os campos!");
        finalizarAguardar();
        return false;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

fetch("http://localhost:3333/usuarios/autenticar", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
    })
})
    .then(function (resposta) {

        console.log("Resposta do login:", resposta);

        if (resposta.ok) {

            resposta.json().then(json => {
                console.log("Usuário logado:", json);

                // guardar dados do usuário na sessão
                sessionStorage.EMAIL_USUARIO = json.email;
                sessionStorage.NOME_USUARIO = json.nome;
                sessionStorage.ID_USUARIO = json.id;

                alert("Login realizado com sucesso!");

                setTimeout(() => {
                    window.location = "index.html";
                }, 1000);

            });

        } else {
            resposta.text().then(texto => {
                console.error("Erro no login:", texto);
                alert("E-mail ou senha inválidos");
            });
        }

    }).catch(function (erro) {
        console.log(erro);
        alert("Erro ao conectar com o servidor");
    });

    return false;
}

function aguardar() {
    console.log("Carregando...");
}

function finalizarAguardar() {
    console.log("Fim do carregamento");
}

</script>
